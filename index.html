<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TAMIM TV | প্রিমিয়াম গ্লাসি আইপিটিভি</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: ডিজিটাল ফন্ট -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (ফ্রি আইকন) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <!-- হেডার: লোগো + গ্লাসি ইফেক্ট -->
        <div class="header glass-card">
            <div class="logo-area">
                <div class="animated-logo">
                    <i class="fas fa-tv"></i>
                    <span>TAMIM</span>
                </div>
                <div class="logo-glow">TV</div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <i class="fas fa-circle live-dot"></i>
                    <span id="liveUsers">128</span> লাইভ
                </div>
                <div class="stat-item">
                    <i class="fas fa-eye"></i>
                    <span id="totalViews">8923</span> ভিউ
                </div>
            </div>
        </div>

        <!-- ভিডিও প্লেয়ার (গ্লাসি + প্রিমিয়াম) -->
        <div class="player-wrapper glass-card">
            <video id="myVideo" poster="https://via.placeholder.com/1280x720/1a1a2e/ffffff?text=TAMIM+TV+LIVE" controls>
                <source src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" type="application/x-mpegURL">
                আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
            </video>
            <div class="player-controls-overlay">
                <button id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button id="nextBtn"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>

        <!-- চ্যানেল লিস্ট (গ্লাসি কার্ড) -->
        <div class="channels-section glass-card">
            <h3><i class="fas fa-list-ul"></i> প্রিমিয়াম চ্যানেল</h3>
            <div class="channel-grid" id="channelList">
                <!-- ডায়নামিক জাভাস্ক্রিপ্ট দিয়ে ঢুকানো হবে -->
            </div>
        </div>

        <!-- ফুটার + ফিডব্যাক -->
        <div class="footer glass-card">
            <p>আমার টিভি সম্পর্কে মতামত জানাতে: <i class="fas fa-envelope"></i> tamimtv@glassy.com</p>
            <p>© 2026 TAMIM TV | প্রিমিয়াম গ্লাসি ডিজাইন</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
